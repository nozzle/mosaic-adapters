packages:
  - packages/*
  - examples/react/*

catalog:
  '@duckdb/duckdb-wasm': 1.33.1-dev57.0
  '@eslint-react/eslint-plugin': ^5.9.3
  '@playwright/test': ^1.61.1
  '@tanstack/eslint-config': ^0.4.0
  '@tanstack/react-store': ^0.11.0
  '@tanstack/react-table': ^8.21.3
  '@tanstack/store': ^0.11.0
  '@tanstack/table-core': ^8.21.3
  '@tanstack/vite-config': ^0.5.2
  '@testing-library/dom': '^10.4.0'
  '@testing-library/react': '^16.3.0'
  '@types/node': ^26.0.1
  '@uwdata/flechette': ^2.5.0
  '@uwdata/mosaic-core': ^0.28.1
  '@uwdata/mosaic-sql': ^0.28.1
  '@uwdata/vgplot': ^0.28.1
  '@vitejs/plugin-react': ^6.0.3
  eslint: ^10.5.0
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-unused-imports: ^4.4.1
  jsdom: ^29.1.1
  rimraf: ^6.1.3
  typescript: ^6.0.3
  typescript-eslint: ^8.62.0
  vite: ^8.1.0
  vitest: ^4.1.9

cleanupUnusedCatalogs: true

linkWorkspacePackages: true

onlyBuiltDependencies:
  - esbuild

preferWorkspacePackages: true

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@nozzleio/*'
  - '@uwdata/flechette'
  - '@uwdata/mosaic-*'
  - '@uwdata/vgplot'

overrides:
  '@nozzleio/mosaic-tanstack-table-core': 'workspace:*'
  '@nozzleio/mosaic-tanstack-react-table': 'workspace:*'
  '@nozzleio/mosaic-core': 'workspace:*'
  '@nozzleio/react-mosaic': 'workspace:*'
  '@nozzleio/test-support': 'workspace:*'

allowBuilds:
  esbuild: true
  nx: true
  unrs-resolver: true
