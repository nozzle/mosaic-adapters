packages:
  - packages/*
  - examples/react/*

catalog:
  '@eslint-react/eslint-plugin': ^3.0.0
  '@playwright/test': ^1.60.0
  '@tanstack/eslint-config': ^0.4.0
  '@tanstack/react-store': ^0.9.1
  '@tanstack/store': ^0.9.1
  '@tanstack/table-core': ^8.17.3
  '@tanstack/vite-config': ^0.5.2
  '@types/node': ^25.0.8
  '@uwdata/mosaic-core': ^0.27.0
  '@uwdata/mosaic-sql': ^0.27.0
  '@uwdata/vgplot': ^0.27.0
  '@vitejs/plugin-react': ^6.0.2
  eslint: ^10.4.1
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-unused-imports: ^4.4.1
  jsdom: ^29.1.1
  rimraf: ^6.1.3
  typescript: ^5.9.3
  typescript-eslint: ^8.61.0
  vite: ^8.0.16
  vitest: ^4.1.8

cleanupUnusedCatalogs: true

linkWorkspacePackages: true

onlyBuiltDependencies:
  - esbuild

preferWorkspacePackages: true

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@nozzleio/*'
  - '@uwdata/mosaic-*'
  - '@uwdata/vgplot'

overrides:
  '@nozzleio/mosaic-tanstack-table-core': 'workspace:*'
  '@nozzleio/mosaic-tanstack-react-table': 'workspace:*'
  '@nozzleio/react-mosaic': 'workspace:*'

allowBuilds:
  esbuild: true
  nx: true
  unrs-resolver: true
