name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Tools
        uses: TanStack/config/.github/setup@b313637fa7d314532b98638f6b57b7b9c169d390 # main

      - name: Check GitHub Action pins
        run: pnpm run actions:pin-check

      - name: Configure npm registry for trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Show release tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Run CI checks
        run: pnpm run test:ci

      - name: Archive package build output
        run: |
          tar -czf package-dist-${{ github.run_id }}.tgz packages/*/dist
          shasum -a 256 package-dist-${{ github.run_id }}.tgz > package-dist-${{ github.run_id }}.tgz.sha256

      - name: Upload package build output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-dist-${{ github.run_id }}
          path: |
            package-dist-${{ github.run_id }}.tgz
            package-dist-${{ github.run_id }}.tgz.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Tools
        uses: TanStack/config/.github/setup@b313637fa7d314532b98638f6b57b7b9c169d390 # main

      - name: Configure npm registry for trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Download package build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-dist-${{ github.run_id }}

      - name: Verify package build output
        run: shasum -a 256 -c package-dist-${{ github.run_id }}.tgz.sha256

      - name: Restore package build output
        run: tar -xzf package-dist-${{ github.run_id }}.tgz

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: 'ci: version packages'
          title: 'ci: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
