name: pr

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  TEST_VAR: FooBar

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: TanStack/config/.github/setup@e4b48f16568324f76f467aa4c2aac2f05db632c3 # main

      - name: Get base and head commits for `nx affected`
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0
        with:
          main-branch-name: main

      - name: Cache Playwright browsers
        # Keep this PR workflow's cache scoped to the PR so PR runs do not pollute main.
        # If a similar setup is needed on main, create a separate ci.yml that is
        # audited exclusively for the main context, especially cache poisoning risks.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-pr-${{ github.event.pull_request.number }}

      - name: Install Playwright browsers
        run: pnpm run playwright:install

      - name: Check formatting
        run: pnpm run test:format

      - name: Run checks for PR
        run: pnpm run test:pr
