name: pr

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  TEST_VAR: FooBar

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Tools
        uses: TanStack/config/.github/setup@695e782edc39b6907f79e51f4d56dc15af97df60 # main

      - name: Check GitHub Action pins
        run: pnpm run actions:pin-check

      - name: Get base and head commits for `nx affected`
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1
        with:
          main-branch-name: main

      - name: Cache Playwright browsers
        # Keep this PR workflow's cache scoped to the PR so PR runs do not pollute main.
        # If a similar setup is needed on main, create a separate ci.yml that is
        # audited exclusively for the main context, especially cache poisoning risks.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-pr-${{ github.event.pull_request.number }}

      - name: Install Playwright browsers
        run: pnpm run playwright:install

      - name: Check formatting
        run: pnpm run test:format

      - name: Run checks for PR
        run: pnpm run test:pr
